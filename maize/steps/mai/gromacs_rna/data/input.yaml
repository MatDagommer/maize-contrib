Backbone:
  file_path: DNA_backbone.pdb
  fixed_bonds: []
  interconnects:  #Backbone to backbone connection
  - 10
  - 1
  linker:   #Backbone to base connection
  - 12
  - 13
Base modified_cytosine:
  code:  M # Three letter PDB code
  file_path: ./maize/steps/mai/gromacs_rna/data/blocks/5methylcytosine.pdb # Path to the 3D structure of the nucleobase
  linker: # Indices of the vector forming the bond between the nucleobase and the backbone
  - 2 
  - 1
  name: M # One-letter name of the base
  pair_name: G # One-letter name of the pairing base
  align: true
