# maize global configuration file example
# Where to save temporary files and all workflow directories
scratch = "/tmp"

# Additional packages to load
packages = [
    "maize.steps.mai"
]

# Batch job system options
[batch]
system = "local"           # Can be one of {'cobalt', 'flux', 'local', 'lsf', 'pbspro', 'rp', 'slurm'}
max_jobs = 100             # The maximum number of jobs that can be submitted by a node at once

[OligoAnalysis]
python = "/projects/mai/se_mai/users/${USER}_pallavi/softwares/miniconda3/envs/maize-prolif/bin/python"
modules = ["GROMACS/2021.3-foss-2021a-CUDA-11.3.1-PLUMED-2.7.2", "x3dna-dssr/2.4.2"]
commands.gmx = "/opt/scp/apps/gen-2021a/software/GROMACS/2021.3-foss-2021a-CUDA-11.3.1-PLUMED-2.7.2/bin/gmx"
commands.x3dna-dssr = "/opt/scp/apps/system/software/x3dna-dssr/2.4.2/bin/x3dna-dssr"

